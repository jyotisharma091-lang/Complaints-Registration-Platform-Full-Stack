<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints Portal | Premium Support</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav id="main-nav" class="hidden">
        <div class="nav-container">
            <h1 class="logo">Resolve<span>AI</span></h1>
            <div class="nav-links">
                <span id="user-info" class="user-info"></span>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Register Page -->
        <section id="register-page" class="card glass">
            <h2>Create Account</h2>
            <p class="subtitle">Join our premium complaint resolution platform</p>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="john@example.com" required>
                </div>
                <button type="submit" class="btn-primary">Send OTP</button>
                <p class="auth-switch">Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>

            <form id="otp-form" class="hidden">
                <div class="form-group">
                    <label for="reg-otp">Enter 6-digit OTP</label>
                    <input type="text" id="reg-otp" maxlength="6" placeholder="123456" required>
                </div>
                <button type="submit" class="btn-primary">Verify OTP</button>
            </form>

            <form id="password-form" class="hidden">
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <input type="password" id="reg-confirm-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Complete Registration</button>
            </form>
        </section>

        <!-- Login Page -->
        <section id="login-page" class="card glass hidden">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to manage your complaints</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
                <p class="auth-switch">Don't have an account? <a href="#" id="show-register">Register</a></p>
            </form>
        </section>

        <!-- Complaint Submission Page -->
        <section id="submit-page" class="card glass hidden">
            <div class="header-row">
                <h2>Submit Complaint</h2>
                <button id="back-to-my-complaints" class="btn-text">← My Complaints</button>
            </div>
            <form id="complaint-form">
                <div class="form-group">
                    <label for="complaint-text">Describe your issue</label>
                    <textarea id="complaint-text" rows="5" placeholder="Please provide details about the problem..." required></textarea>
                </div>
                <button type="button" id="get-ai-question" class="btn-primary">Analyze with AI</button>

                <div id="ai-section" class="hidden">
                    <div class="ai-question-box">
                        <p class="ai-label">AI Follow-up Question:</p>
                        <p id="display-ai-question" class="ai-question-text"></p>
                    </div>
                    <div class="form-group">
                        <label for="user-answer">Your Answer</label>
                        <textarea id="user-answer" rows="3" placeholder="Provide more details..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Submit Final Complaint</button>
                </div>
            </form>
        </section>

        <!-- My Complaints Page -->
        <section id="my-complaints-page" class="card glass hidden">
            <div class="header-row">
                <h2>My Complaints</h2>
                <button id="show-submit-page" class="btn-primary">+ New Complaint</button>
            </div>
            <div id="my-complaints-list" class="complaints-list">
                <!-- Complaints will be injected here -->
            </div>
        </section>

        <!-- Admin Dashboard -->
        <section id="admin-dashboard" class="card glass hidden">
            <div class="header-row">
                <h2>Admin Dashboard</h2>
                <div class="admin-stats">
                    <span id="total-complaints">Total: 0</span>
                </div>
            </div>
            <div id="admin-complaints-list" class="complaints-list">
                <!-- All complaints will be injected here -->
            </div>
        </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
